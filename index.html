<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>课时打卡</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f5f5f5;min-height:100vh;color:#1a1a1a}
.app{max-width:480px;margin:0 auto;background:#f5f5f5;min-height:100vh}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #eee}
.tab{flex:1;padding:12px 0;font-size:14px;text-align:center;cursor:pointer;color:#999;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#378ADD;border-bottom-color:#378ADD;font-weight:500}
.page{display:none;padding:16px}.page.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:12px;padding:12px 8px;text-align:center}
.stat-num{font-size:24px;font-weight:600;color:#1a1a1a}
.stat-label{font-size:11px;color:#999;margin-top:2px}
.big-checkin-btn{background:#378ADD;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:500;cursor:pointer;width:100%;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.big-checkin-btn:active{opacity:0.85}
.pulse-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.75);flex-shrink:0}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px}
.student-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0}
.student-item:last-child{border-bottom:none}
.avatar{width:40px;height:40px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#185FA5;flex-shrink:0}
.student-info{flex:1;min-width:0}
.student-name{font-size:15px;font-weight:500;color:#1a1a1a}
.student-meta{font-size:12px;color:#999;margin-top:2px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-ok{background:#EAF3DE;color:#3B6D11}
.badge-low{background:#FAEEDA;color:#854F0B}
.badge-empty{background:#FCEBEB;color:#A32D2D}
.edit-btn{padding:6px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;color:#555;cursor:pointer;flex-shrink:0}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:#999;margin-bottom:5px}
input[type=text],input[type=number],select{width:100%;padding:11px 12px;border:1px solid #e0e0e0;border-radius:10px;font-size:15px;color:#1a1a1a;background:#fff;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:#378ADD}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;border:none}
.btn:active{opacity:0.8}
.btn-primary{background:#378ADD;color:#fff}
.btn-secondary{background:#f0f0f0;color:#555}
.btn-danger{background:#FCEBEB;color:#A32D2D}
.checkin-panel{background:#E6F1FB;border-radius:16px;padding:24px 20px;text-align:center;margin-top:12px}
.checkin-name{font-size:22px;font-weight:600;color:#042C53;margin-bottom:4px}
.checkin-sessions{font-size:14px;color:#185FA5;margin-bottom:10px}
.checkin-hint{font-size:13px;color:#378ADD;margin-bottom:20px;padding:10px 14px;background:rgba(255,255,255,0.65);border-radius:10px;line-height:1.6}
.confirm-btn{width:100%;padding:16px;border-radius:12px;border:none;font-size:17px;font-weight:600;cursor:pointer}
.confirm-btn-active{background:#378ADD;color:#fff}
.confirm-btn-done{background:#3B6D11;color:#fff}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0f0f0}
.history-item:last-child{border-bottom:none}
.history-name{font-size:14px;font-weight:500;color:#1a1a1a}
.history-time{font-size:11px;color:#bbb;margin-top:2px}
.history-right{text-align:right}
.delta-consume{font-size:14px;font-weight:600;color:#A32D2D}
.delta-add{font-size:14px;font-weight:600;color:#3B6D11}
.delta-neutral{font-size:14px;font-weight:600;color:#888}
.remaining{font-size:11px;color:#bbb;margin-top:2px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:480px}
.modal-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;color:#1a1a1a}
.delta-row{display:flex;gap:8px}
.delta-row input{flex:1}
.delta-apply-btn{padding:11px 16px;border-radius:10px;border:1px solid #ddd;background:#f5f5f5;font-size:14px;color:#555;cursor:pointer;white-space:nowrap;flex-shrink:0}
.divider{height:1px;background:#f0f0f0;margin:14px 0}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.empty{text-align:center;padding:40px 20px;color:#bbb;font-size:14px}
.alert-box{padding:12px 14px;border-radius:10px;font-size:14px;margin-top:12px;color:#A32D2D;background:#FCEBEB;line-height:1.6}

.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.filter-grid select{font-size:14px}
.filter-hint{font-size:11px;color:#aaa;line-height:1.5;margin-top:4px}
.history-main{flex:1;min-width:0;padding-right:10px}
.history-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.history-delete-btn{padding:6px 10px;border-radius:8px;border:1px solid #F1C5C5;background:#fff;color:#A32D2D;font-size:12px;cursor:pointer;white-space:nowrap}
.history-delete-btn.armed{background:#FCEBEB;font-weight:600}
.summary-line{font-size:12px;color:#999;margin:0 0 10px 0}
</style>
</head>
<body>

<div class="app">
  <div class="tab-bar">
    <button class="tab active" id="tab-students" onclick="showTab('students',this)">学员管理</button>
    <button class="tab" id="tab-checkin" onclick="showTab('checkin',this)">课后打卡</button>
    <button class="tab" id="tab-history" onclick="showTab('history',this)">消课记录</button>
  </div>

  <div id="page-students" class="page active">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">学员总数</div></div>
      <div class="stat-card"><div class="stat-num" id="s-sessions">0</div><div class="stat-label">总剩余课时</div></div>
      <div class="stat-card"><div class="stat-num" id="s-low">0</div><div class="stat-label">课时不足</div></div>
    </div>
    <button class="big-checkin-btn" onclick="showTab('checkin', document.getElementById('tab-checkin'))">
      <div class="pulse-dot"></div>上课打卡
    </button>
    <div class="card">
      <div class="card-title">添加新学员</div>
      <div class="form-row" style="margin-bottom:10px">
        <div><div class="form-label">姓名</div><input type="text" id="new-name" placeholder="学员姓名"></div>
        <div><div class="form-label">初始课时</div><input type="number" id="new-sessions" placeholder="节数" min="0"></div>
      </div>
      <button class="btn btn-primary" onclick="addStudent()">添加学员</button>
    </div>
    <div id="student-list"></div>
  </div>

  <div id="page-checkin" class="page">
    <div class="card">
      <div class="card-title">选择学员</div>
      <select id="checkin-select" onchange="updateCheckin()">
        <option value="">-- 请选择上课学员 --</option>
      </select>
      <div id="checkin-area"></div>
    </div>
  </div>

  <div id="page-history" class="page">
    <div class="card" style="margin-bottom:12px">
      <div class="filter-grid">
        <select id="history-filter" onchange="renderHistory()">
          <option value="">全部学员</option>
        </select>
        <select id="history-year" onchange="renderMonthFilter(); renderHistory()">
          <option value="">全部年份</option>
        </select>
      </div>
      <div class="filter-grid" style="margin-bottom:0">
        <select id="history-month" onchange="renderHistory()">
          <option value="">全部月份</option>
        </select>
        <select id="history-action" onchange="renderHistory()">
          <option value="">全部类型</option>
          <option value="上课打卡">上课打卡</option>
          <option value="手动加课">手动加课</option>
          <option value="手动退课">手动退课</option>
          <option value="初始录入">初始录入</option>
          <option value="删除学员">删除学员</option>
        </select>
      </div>
      <div class="filter-hint">删除记录会同时撤销该记录对应的课时变化。例如删除一次“上课打卡”，会把该学员课时加回 1 节。</div>
    </div>
    <div class="card" id="history-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-edit" onclick="handleOverlayClick(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">编辑课时</div>
    <div class="form-group">
      <div class="form-label">直接设置课时总数</div>
      <input type="number" id="edit-total" min="0" placeholder="输入新的课时数">
    </div>
    <div class="divider"></div>
    <div class="form-group">
      <div class="form-label">加课 / 退课（正数加，负数退）</div>
      <div class="delta-row">
        <input type="number" id="edit-delta" placeholder="如 10 或 -5">
        <button class="delta-apply-btn" onclick="applyDelta()">应用</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-danger" id="delete-btn" onclick="deleteStudent()">删除该学员</button>
  </div>
</div>

<script>
var STORAGE_KEY = 'gym_checkin_v1_data';
var students = [];
var records = [];
var editId = null;
var activeTab = 'students';
var deleteArmed = false;
var deleteTimer = null;
var armedRecordId = null;
var recordDeleteTimer = null;

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    students = Array.isArray(data.students) ? data.students : [];
    records = Array.isArray(data.records) ? data.records : [];
    records = records.map(normalizeRecord);
  } catch (e) {
    console.warn('读取本地数据失败', e);
    students = [];
    records = [];
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ students: students, records: records }));
  } catch (e) {
    alert('本地保存失败：可能是浏览器存储空间不足或隐私模式限制。');
    console.warn('保存本地数据失败', e);
  }
}

function uid() { return Date.now() + '_' + Math.random().toString(36).slice(2); }
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function nowISO() { return new Date().toISOString(); }
function ts(iso) {
  var d = iso ? new Date(iso) : new Date();
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function escapeHtml(str) {
  return String(str || '').replace(/[&<>'"]/g, function(ch) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[ch];
  });
}
function initials(name) { return (name||'').slice(0,2); }
function badgeHtml(s) {
  if (s.sessions <= 0) return '<span class="badge badge-empty">已用完</span>';
  if (s.sessions <= 3) return '<span class="badge badge-low">即将用完</span>';
  return '<span class="badge badge-ok">正常</span>';
}

function inferDateFromOldTime(timeText) {
  var now = new Date();
  if (!timeText) return nowISO();
  var m = String(timeText).match(/(\d{1,4})\/(\d{1,2})(?:\/(\d{1,2}))?\s+(\d{1,2}):(\d{1,2})/);
  if (!m) return nowISO();
  var y, mo, day, h, mi;
  if (m[3]) { y = parseInt(m[1]); mo = parseInt(m[2]); day = parseInt(m[3]); h = parseInt(m[4]); mi = parseInt(m[5]); }
  else { y = now.getFullYear(); mo = parseInt(m[1]); day = parseInt(m[2]); h = parseInt(m[4]); mi = parseInt(m[5]); }
  return new Date(y, mo - 1, day, h, mi, 0).toISOString();
}

function normalizeRecord(r) {
  r = r || {};
  if (!r.rid) r.rid = uid();
  if (!r.createdAt) r.createdAt = inferDateFromOldTime(r.time);
  if (!r.time) r.time = ts(r.createdAt);
  if (typeof r.delta !== 'number') r.delta = parseInt(r.delta) || 0;
  return r;
}

function addRecord(obj) {
  var iso = nowISO();
  var rec = Object.assign({ rid: uid(), createdAt: iso, time: ts(iso) }, obj || {});
  records.unshift(normalizeRecord(rec));
}

function getRecordDate(r) {
  return new Date((r && r.createdAt) || inferDateFromOldTime(r && r.time));
}

function showTab(t, el) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
  document.querySelectorAll('.page').forEach(function(x){ x.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('page-'+t).classList.add('active');
  if (t === 'students') renderStudents();
  if (t === 'checkin') renderCheckinSelect();
  if (t === 'history') { renderHistoryFilter(); renderYearFilter(); renderMonthFilter(); renderHistory(); }
}

function updateStats() {
  document.getElementById('s-total').textContent = students.length;
  document.getElementById('s-sessions').textContent = students.reduce(function(a,s){ return a + s.sessions; }, 0);
  document.getElementById('s-low').textContent = students.filter(function(s){ return s.sessions <= 3; }).length;
}

function renderStudents() {
  updateStats();
  var list = document.getElementById('student-list');
  if (!students.length) {
    list.innerHTML = '<div class="empty">暂无学员，请在上方添加</div>';
    return;
  }
  list.innerHTML = students.map(function(s) {
    return '<div class="card"><div class="student-item" style="border:none;padding:0">'
      + '<div class="avatar">' + escapeHtml(initials(s.name)) + '</div>'
      + '<div class="student-info"><div class="student-name">' + escapeHtml(s.name) + '</div>'
      + '<div class="student-meta">剩余 <b>' + s.sessions + '</b> 节课时</div></div>'
      + badgeHtml(s)
      + '<button class="edit-btn" onclick="openEdit(\'' + s.id + '\')">编辑</button>'
      + '</div></div>';
  }).join('');
}

function addStudent() {
  var nameEl = document.getElementById('new-name');
  var sesEl = document.getElementById('new-sessions');
  var name = nameEl.value.trim();
  var sessions = parseInt(sesEl.value) || 0;
  if (!name) { alert('请输入学员姓名'); return; }
  var s = { id: uid(), name: name, sessions: sessions };
  students.push(s);
  addRecord({ student: s.name, sid: s.id, action: '初始录入', delta: sessions, sessions: sessions });
  saveData();
  nameEl.value = '';
  sesEl.value = '';
  renderStudents();
}

function openEdit(id) {
  editId = id;
  resetDeleteButton();
  var s = students.find(function(x){ return x.id === id; });
  document.getElementById('modal-title').textContent = '编辑课时 — ' + s.name;
  document.getElementById('edit-total').value = s.sessions;
  document.getElementById('edit-delta').value = '';
  document.getElementById('modal-edit').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-edit').classList.remove('show');
  resetDeleteButton();
  editId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-edit')) closeModal();
}

function applyDelta() {
  var delta = parseInt(document.getElementById('edit-delta').value) || 0;
  if (!delta) { alert('请输入数量'); return; }
  var s = students.find(function(x){ return x.id === editId; });
  document.getElementById('edit-total').value = Math.max(0, s.sessions + delta);
}

function saveEdit() {
  var total = parseInt(document.getElementById('edit-total').value);
  if (isNaN(total) || total < 0) { alert('请输入有效的课时数'); return; }
  var s = students.find(function(x){ return x.id === editId; });
  var prev = s.sessions;
  s.sessions = total;
  var delta = total - prev;
  if (delta !== 0) {
    addRecord({ student: s.name, sid: s.id, action: delta > 0 ? '手动加课' : '手动退课', delta: delta, sessions: s.sessions });
    saveData();
  }
  closeModal();
  renderStudents();
}

function resetDeleteButton() {
  deleteArmed = false;
  if (deleteTimer) { clearTimeout(deleteTimer); deleteTimer = null; }
  var btn = document.getElementById('delete-btn');
  if (btn) btn.textContent = '删除该学员';
}

function deleteStudent() {
  var s = students.find(function(x){ return x.id === editId; });
  if (!s) return;
  if (!deleteArmed) {
    deleteArmed = true;
    var btn = document.getElementById('delete-btn');
    if (btn) btn.textContent = '再次点击确认删除';
    deleteTimer = setTimeout(function(){ resetDeleteButton(); }, 3000);
    return;
  }
  students = students.filter(function(x){ return x.id !== editId; });
  addRecord({ student: s.name, sid: s.id, action: '删除学员', delta: 0, sessions: s.sessions });
  saveData();
  closeModal();
  renderStudents();
}

function renderCheckinSelect() {
  var sel = document.getElementById('checkin-select');
  sel.innerHTML = '<option value="">-- 请选择上课学员 --</option>'
    + students.map(function(s){ return '<option value="' + s.id + '">' + escapeHtml(s.name) + '（剩余' + s.sessions + '节）</option>'; }).join('');
  document.getElementById('checkin-area').innerHTML = '';
}

function updateCheckin() {
  var id = document.getElementById('checkin-select').value;
  var area = document.getElementById('checkin-area');
  if (!id) { area.innerHTML = ''; return; }
  var s = students.find(function(x){ return x.id === id; });
  if (s.sessions <= 0) {
    area.innerHTML = '<div class="alert-box">该学员课时已用完，无法消课。<br>请先在学员页面为其加课。</div>';
    return;
  }
  area.innerHTML = '<div class="checkin-panel" id="panel-' + id + '">'
    + '<div class="checkin-name">' + escapeHtml(s.name) + '</div>'
    + '<div class="checkin-sessions" id="csub-' + id + '">当前剩余 ' + s.sessions + ' 节课时</div>'
    + '<div class="checkin-hint">请将手机递给学员<br>由学员本人点击下方按钮确认</div>'
    + '<button class="confirm-btn confirm-btn-active" id="cbtn-' + id + '" onclick="confirmCheckin(\'' + id + '\')">确认本次上课，消耗 1 课时</button>'
    + '</div>';
}

function confirmCheckin(id) {
  var s = students.find(function(x){ return x.id === id; });
  if (!s || s.sessions <= 0) return;
  s.sessions = Math.max(0, s.sessions - 1);
  addRecord({ student: s.name, sid: id, action: '上课打卡', delta: -1, sessions: s.sessions });
  saveData();
  var btn = document.getElementById('cbtn-' + id);
  btn.textContent = '已确认签到  剩余 ' + s.sessions + ' 节';
  btn.className = 'confirm-btn confirm-btn-done';
  btn.disabled = true;
  var sub = document.getElementById('csub-' + id);
  if (sub) sub.textContent = '打卡成功，当前剩余 ' + s.sessions + ' 节';
  var opt = document.getElementById('checkin-select').querySelector('option[value="' + id + '"]');
  if (opt) opt.textContent = s.name + '（剩余' + s.sessions + '节）';
  if (activeTab === 'students') updateStats();
}

function renderHistoryFilter() {
  var sel = document.getElementById('history-filter');
  var cur = sel.value;
  sel.innerHTML = '<option value="">全部学员</option>'
    + students.map(function(s){ return '<option value="' + s.id + '">' + escapeHtml(s.name) + '</option>'; }).join('');
  if (cur) sel.value = cur;
}

function renderYearFilter() {
  var sel = document.getElementById('history-year');
  var cur = sel.value;
  var years = records.map(function(r){ return getRecordDate(r).getFullYear(); })
    .filter(function(y, i, arr){ return arr.indexOf(y) === i; })
    .sort(function(a,b){ return b-a; });
  sel.innerHTML = '<option value="">全部年份</option>' + years.map(function(y){ return '<option value="' + y + '">' + y + '年</option>'; }).join('');
  if (cur && years.indexOf(parseInt(cur)) !== -1) sel.value = cur;
}

function renderMonthFilter() {
  var year = document.getElementById('history-year').value;
  var sel = document.getElementById('history-month');
  var cur = sel.value;
  var months = records.filter(function(r){ return !year || getRecordDate(r).getFullYear() == year; })
    .map(function(r){ return getRecordDate(r).getMonth() + 1; })
    .filter(function(m, i, arr){ return arr.indexOf(m) === i; })
    .sort(function(a,b){ return a-b; });
  sel.innerHTML = '<option value="">全部月份</option>' + months.map(function(m){ return '<option value="' + m + '">' + m + '月</option>'; }).join('');
  if (cur && months.indexOf(parseInt(cur)) !== -1) sel.value = cur;
}

function getFilteredHistoryItems() {
  var sid = document.getElementById('history-filter').value;
  var year = document.getElementById('history-year').value;
  var month = document.getElementById('history-month').value;
  var action = document.getElementById('history-action').value;
  return records.filter(function(h) {
    var d = getRecordDate(h);
    if (sid && h.sid !== sid) return false;
    if (year && d.getFullYear() != year) return false;
    if (month && (d.getMonth() + 1) != month) return false;
    if (action && h.action !== action) return false;
    return true;
  });
}

function renderHistory() {
  resetRecordDeleteButtons();
  var items = getFilteredHistoryItems();
  var list = document.getElementById('history-list');
  if (!items.length) { list.innerHTML = '<div class="empty">暂无记录</div>'; return; }
  var totalDelta = items.reduce(function(a,h){ return a + (h.delta || 0); }, 0);
  var consumeCount = items.filter(function(h){ return h.action === '上课打卡'; }).length;
  list.innerHTML = '<div class="summary-line">共 ' + items.length + ' 条记录 · 上课打卡 ' + consumeCount + ' 次 · 课时净变化 ' + (totalDelta > 0 ? '+' : '') + totalDelta + '</div>'
    + items.map(function(h) {
      var cls = h.delta > 0 ? 'delta-add' : h.delta < 0 ? 'delta-consume' : 'delta-neutral';
      var sign = h.delta > 0 ? '+' : '';
      return '<div class="history-item" id="record-' + h.rid + '">'
        + '<div class="history-main"><div class="history-name">' + escapeHtml(h.student) + '</div>'
        + '<div class="history-time">' + escapeHtml(h.time || ts(h.createdAt)) + ' · ' + escapeHtml(h.action) + '</div></div>'
        + '<div class="history-actions"><div class="history-right"><div class="' + cls + '">' + sign + h.delta + ' 节</div>'
        + '<div class="remaining">余 ' + h.sessions + ' 节</div></div>'
        + '<button class="history-delete-btn" id="delete-record-' + h.rid + '" onclick="deleteHistoryRecord(\'' + h.rid + '\')">删除</button></div></div>';
    }).join('');
}

function resetRecordDeleteButtons() {
  armedRecordId = null;
  if (recordDeleteTimer) { clearTimeout(recordDeleteTimer); recordDeleteTimer = null; }
  document.querySelectorAll('.history-delete-btn').forEach(function(btn){ btn.textContent = '删除'; btn.classList.remove('armed'); });
}

function deleteHistoryRecord(rid) {
  var r = records.find(function(x){ return x.rid === rid; });
  if (!r) return;
  if (armedRecordId !== rid) {
    resetRecordDeleteButtons();
    armedRecordId = rid;
    var btn = document.getElementById('delete-record-' + rid);
    if (btn) { btn.textContent = '确认'; btn.classList.add('armed'); }
    recordDeleteTimer = setTimeout(function(){ resetRecordDeleteButtons(); }, 3000);
    return;
  }

  if (r.delta && r.sid) {
    var s = students.find(function(x){ return x.id === r.sid; });
    if (s) {
      s.sessions = Math.max(0, s.sessions - r.delta);
    }
  }
  records = records.filter(function(x){ return x.rid !== rid; });
  saveData();
  renderStudents();
  renderYearFilter();
  renderMonthFilter();
  renderHistory();
}

loadData();
renderStudents();
</script>
</body>
</html>
